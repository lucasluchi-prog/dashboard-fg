name: web

on:
  push:
    branches: [main]
    paths:
      - "projeto-web/**"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "projeto-web/**"
      - ".github/workflows/web.yml"

defaults:
  run:
    working-directory: projeto-web

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: projeto-web/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
