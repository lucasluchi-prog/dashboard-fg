name: web

on:
  push:
    branches: [main]
    paths:
      - "projeto-web/**"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "projeto-web/**"
      - ".github/workflows/web.yml"

defaults:
  run:
    working-directory: projeto-web

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
