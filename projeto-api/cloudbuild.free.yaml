# Cloud Build para dashboard-fg-api (free tier com Supabase Postgres):
#   gcloud builds submit --config projeto-api/cloudbuild.free.yaml projeto-api/ \
#     --substitutions=_REGION=southamerica-east1

substitutions:
  _REGION: southamerica-east1
  _SERVICE: dashboard-fg-api

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/dashboard-fg/api:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/dashboard-fg/api:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/dashboard-fg/api

  - id: migrate
    name: python:3.11-slim
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        apt-get update -qq && apt-get install -qq -y libpq-dev gcc >/dev/null
        pip install --quiet -U pip
        pip install --quiet -e .
        alembic upgrade head
    secretEnv: ["DATABASE_URL_SYNC"]
    env: ["ENV=prod"]

  - id: deploy
    name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/dashboard-fg/api:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated=false
      - --min-instances=0
      - --max-instances=2
      - --cpu=1
      - --memory=512Mi
      - --set-env-vars=ENV=prod,ALLOWED_DOMAIN=furtadoguerini.com.br
      - --set-secrets=DATABASE_URL=dashboard-fg-db-url:latest,DATABASE_URL_SYNC=dashboard-fg-db-url-sync:latest,DATAJURI_USER=dashboard-fg-datajuri-user:latest,DATAJURI_PASSWORD=dashboard-fg-datajuri-password:latest,OAUTH_CLIENT_ID=dashboard-fg-oauth-client:latest,OAUTH_CLIENT_SECRET=dashboard-fg-oauth-secret:latest,SESSION_SECRET=dashboard-fg-session:latest

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/dashboard-fg-db-url-sync/versions/latest
      env: DATABASE_URL_SYNC

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/dashboard-fg/api

options:
  logging: CLOUD_LOGGING_ONLY
