# Cloud Build para dashboard-fg-etl (Cloud Run Job):
#   gcloud builds submit --config projeto-api/cloudbuild.etl.yaml projeto-api/ \
#     --substitutions=_REGION=southamerica-east1

substitutions:
  _REGION: southamerica-east1
  _JOB: dashboard-fg-etl
  _CLOUDSQL_INSTANCE: ""

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.etl
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/dashboard-fg/etl:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/dashboard-fg/etl:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/dashboard-fg/etl

  - id: deploy
    name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - jobs
      - deploy
      - ${_JOB}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/dashboard-fg/etl:$SHORT_SHA
      - --region=${_REGION}
      - --set-cloudsql-instances=${_CLOUDSQL_INSTANCE}
      - --task-timeout=1800
      - --memory=1Gi
      - --cpu=2
      - --max-retries=1
      - --set-env-vars=ENV=prod
      - --set-secrets=DATABASE_URL=dashboard-fg-db-url:latest,DATAJURI_USER=dashboard-fg-datajuri-user:latest,DATAJURI_PASSWORD=dashboard-fg-datajuri-password:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/dashboard-fg/etl

options:
  logging: CLOUD_LOGGING_ONLY
