server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss text/javascript;

  # API proxy — configurar API_BASE no deploy (env do container).
  location /api/ {
    proxy_pass ${API_BASE};
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location = /login { proxy_pass ${API_BASE}/login; }
  location = /logout { proxy_pass ${API_BASE}/logout; }
  location /auth/ { proxy_pass ${API_BASE}; }

  location /healthz {
    access_log off;
    return 200 "ok";
    add_header Content-Type text/plain;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
